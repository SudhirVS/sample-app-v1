apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: platform
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        start_at: beginning
        include_file_path: true
        operators:
          # Parse containerd log format: <timestamp> <stream> <flags> <log>
          - type: regex_parser
            id: parse_containerd
            regex: '^(?P<time>\S+) (?P<stream>stdout|stderr) (?P<flags>\S+) (?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # Move raw log line to body
          - type: move
            from: attributes.log
            to: body
          # Parse app JSON from body
          - type: json_parser
            id: parse_app_json
            on_error: send
          # Extract namespace and container from file path
          - type: regex_parser
            id: extract_namespace
            regex: '^/var/log/pods/(?P<k8s_namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/'
            parse_from: attributes["log.file.path"]
            on_error: send
          - type: move
            from: attributes.k8s_namespace
            to: attributes["k8s.namespace.name"]
          - type: move
            from: attributes.container
            to: attributes["service.name"]

    processors:
      batch:
        timeout: 5s
      resource/add:
        attributes:
          - key: k8s.cluster.name
            value: "minikube"
            action: insert

    exporters:
      otlp:
        endpoint: "signoz-otel-collector.platform.svc.cluster.local:4317"
        tls:
          insecure: true
      logging:
        verbosity: normal

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [batch, resource/add]
          exporters: [otlp, logging]
