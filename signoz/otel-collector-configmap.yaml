apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: platform
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        start_at: beginning
        include_file_path: true
        operators:
          # Parse Docker JSON log wrapper: {"log":"...","stream":"stdout","time":"..."}
          - type: json_parser
            id: parse_docker_json
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
            on_error: send
          # Move raw log string to body
          - type: move
            from: attributes.log
            to: body
          # Parse app-level JSON from body
          - type: json_parser
            id: parse_app_json
            on_error: send
          # Extract namespace, pod, container from file path
          - type: regex_parser
            id: extract_metadata
            regex: '^/var/log/pods/(?P<k8s_namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/'
            parse_from: attributes["log.file.path"]
            on_error: send

    processors:
      batch:
        timeout: 5s
      # Promote extracted attributes to resource-level so SigNoz can filter on them
      resource/labels:
        attributes:
          - key: k8s.namespace.name
            from_attribute: k8s_namespace
            action: insert
          - key: service.name
            from_attribute: container
            action: insert
          - key: k8s.cluster.name
            value: "minikube"
            action: insert
      # Drop logs older than LOG_RETENTION_DAYS
      filter/retention:
        logs:
          exclude:
            match_type: expr
            expressions:
              - 'UnixNano(Now()) - UnixNano(log.ObservedTimestamp) > int(env("LOG_RETENTION_DAYS")) * 24 * 3600 * 1000000000'

    exporters:
      otlp:
        endpoint: "signoz-otel-collector.platform.svc.cluster.local:4317"
        tls:
          insecure: true
      logging:
        verbosity: normal

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [batch, resource/labels, filter/retention]
          exporters: [otlp, logging]
