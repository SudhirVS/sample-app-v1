# Overrides default-chart values for user-service
replicaCount: 1

image:
  repository: user-service
  tag: "latest"
  pullPolicy: Never   # use local minikube image

service:
  type: NodePort
  port: 3000

env:
  - name: PORT
    value: "3000"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

logRetentionDays: 7
