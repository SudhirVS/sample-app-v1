# Overrides default-chart values for order-service
replicaCount: 1

image:
  repository: order-service
  tag: "latest"
  pullPolicy: Never   # use local minikube image

service:
  type: NodePort
  port: 3001

env:
  - name: PORT
    value: "3001"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

logRetentionDays: 7
